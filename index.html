<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>KHALED WATCH — Prestige</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== VARIABLES MODE SOMBRE ===== */
:root {
  --or:#C9A84C; --or-l:#E8C97A; --or-d:#8B6914;
  --bg:#080808; --bg2:#111; --bg3:#1c1c1c;
  --txt:#F5F0E8; --txt2:#ccbfa8; --gris:#999;
  --wa:#25D366;
  --glass:rgba(255,255,255,0.05);
  --bord:rgba(201,168,76,0.28);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

/* ===== MODE CLAIR — contraste renforcé ===== */
body.light {
  --bg:#F2EDE0;
  --bg2:#E8E1CF;
  --bg3:#DDD5C0;
  --txt:#1A1208;        /* noir profond → lisible */
  --txt2:#3A2E18;       /* texte secondaire sombre */
  --gris:#5A4E38;       /* gris sombre lisible */
  --glass:rgba(0,0,0,0.06);
  --bord:rgba(139,105,20,0.4);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Montserrat',sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  overflow-x:hidden;
  transition:background .35s,color .35s;
}

/* ===== SPLASH ===== */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:#000;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  animation:splashOut .7s ease-in-out 3.6s forwards;
}
.splash-txt{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.2rem,5.5vw,2.2rem);
  font-weight:300;color:var(--or);
  letter-spacing:.12em;text-align:center;padding:0 1.5rem;
  opacity:0;animation:fadeUp 1.1s ease-out .4s forwards;
}
.splash-bar{
  width:0;height:1px;margin-top:1.4rem;
  background:linear-gradient(90deg,transparent,var(--or),transparent);
  animation:barIn .9s ease-out 1.1s forwards;
}
.splash-sub{
  font-size:.6rem;letter-spacing:.4em;color:#888;
  text-transform:uppercase;margin-top:.9rem;
  opacity:0;animation:fadeUp .8s ease-out 1.7s forwards;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes barIn{from{width:0}to{width:160px}}
@keyframes splashOut{from{opacity:1;pointer-events:all}to{opacity:0;pointer-events:none;visibility:hidden}}

/* ===== FOND ===== */
.bg-fixed{
  position:fixed;inset:0;z-index:-1;
  background:
    linear-gradient(170deg,rgba(8,8,8,.93) 0%,rgba(8,8,8,.78) 60%,rgba(8,8,8,.96) 100%),
    url('https://images.unsplash.com/photo-1548169874-53e85f753f1e?w=1600&q=85') center/cover no-repeat fixed;
}
body.light .bg-fixed{
  background:
    linear-gradient(170deg,rgba(242,237,224,.95) 0%,rgba(242,237,224,.88) 60%,rgba(242,237,224,.97) 100%),
    url('https://images.unsplash.com/photo-1548169874-53e85f753f1e?w=1600&q=85') center/cover no-repeat fixed;
}

/* ===== HEADER ===== */
.app-header{
  position:sticky;top:0;z-index:200;
  background:rgba(6,6,6,.88);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--bord);
  padding:.85rem 1rem;
  display:flex;align-items:center;justify-content:space-between;
}
body.light .app-header{
  background:rgba(242,237,224,.92);
  border-bottom-color:rgba(139,105,20,.3);
}
.logo-txt{
  font-family:'Cormorant Garamond',serif;
  font-size:1.55rem;font-weight:700;letter-spacing:.15em;
  background:linear-gradient(130deg,var(--or-d),var(--or-l),var(--or),var(--or-d));
  background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:goldShift 4s ease-in-out infinite;
}
@keyframes goldShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.btn-theme{
  background:var(--glass);border:1px solid var(--bord);
  border-radius:50px;padding:.35rem .9rem;
  cursor:pointer;color:var(--or);font-size:.7rem;
  font-family:'Montserrat',sans-serif;letter-spacing:.1em;
  -webkit-tap-highlight-color:transparent;transition:background .25s;
}
body.light .btn-theme{color:var(--or-d);}

/* ===== ACCUEIL HERO ===== */
.home-hero{text-align:center;padding:2rem 1.2rem 1.2rem;}
.home-subtitle{font-size:.6rem;letter-spacing:.35em;color:var(--or);text-transform:uppercase;margin-bottom:.5rem;opacity:.85;}
.home-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2rem,9vw,4rem);font-weight:700;
  background:linear-gradient(130deg,var(--or-d),var(--or-l),var(--or));
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:goldShift 4s ease-in-out infinite;
  letter-spacing:.18em;line-height:1.05;
}
.home-desc{font-size:.72rem;color:var(--txt2);margin-top:.8rem;line-height:1.7;letter-spacing:.04em;}

/* ===== GRILLE CATÉGORIES ===== */
.cat-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:.9rem;padding:1rem 1rem 6rem;
  max-width:600px;margin:0 auto;
}
.cat-card{
  background:var(--glass);
  border:1px solid var(--bord);
  border-radius:16px;
  padding:1.3rem .7rem 1rem;
  display:flex;flex-direction:column;align-items:center;gap:.6rem;
  cursor:pointer;
  transition:transform .25s,box-shadow .25s,border-color .25s;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  /* PAS de pointer-events:none sur les pseudo éléments */
}
body.light .cat-card{
  background:rgba(255,255,255,0.55);
  border-color:rgba(139,105,20,.35);
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}
.cat-card:active{transform:scale(.94);}
.cat-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(201,168,76,.18);border-color:var(--or);}
.cat-icon{font-size:2rem;line-height:1;filter:drop-shadow(0 0 7px rgba(201,168,76,.45));}
.cat-label{
  font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--or);font-weight:700;text-align:center;line-height:1.35;
}
body.light .cat-label{color:var(--or-d);}
.cat-count{font-size:.54rem;color:var(--gris);letter-spacing:.08em;}
body.light .cat-count{color:var(--gris);}

/* ===== PAGE CATÉGORIE ===== */
#page-cat{display:none;}
.page-cat-header{
  display:flex;align-items:center;gap:.85rem;
  padding:.95rem 1rem .4rem;
}
.btn-back{
  background:var(--glass);border:1px solid var(--bord);
  border-radius:50%;width:38px;height:38px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--or);font-size:1.1rem;font-weight:700;
  -webkit-tap-highlight-color:transparent;transition:background .2s;
}
body.light .btn-back{background:rgba(255,255,255,.7);color:var(--or-d);}
.btn-back:active{background:rgba(201,168,76,.15);}
.cat-page-icon{font-size:1.4rem;}
.cat-page-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.55rem;font-weight:700;
  background:linear-gradient(130deg,var(--or-d),var(--or-l));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* Filtres genre */
.gender-tabs{display:flex;gap:.5rem;padding:.4rem 1rem .7rem;}
.g-tab{
  flex:1;text-align:center;padding:.42rem 0;
  border-radius:50px;
  font-size:.63rem;letter-spacing:.16em;text-transform:uppercase;
  border:1px solid rgba(201,168,76,.22);
  color:var(--gris);cursor:pointer;
  background:transparent;font-family:'Montserrat',sans-serif;
  transition:all .22s;-webkit-tap-highlight-color:transparent;
}
.g-tab.active{
  background:rgba(201,168,76,.14);
  border-color:var(--or);color:var(--or);font-weight:700;
}
body.light .g-tab{color:var(--gris);border-color:rgba(139,105,20,.3);}
body.light .g-tab.active{color:var(--or-d);border-color:var(--or-d);background:rgba(139,105,20,.1);}

/* ===== GRILLE PRODUITS ===== */
.prod-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:.85rem;padding:.2rem .9rem 6rem;
}
@media(min-width:600px){.prod-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.prod-grid{grid-template-columns:repeat(4,1fr);}}

/* ===== CARTE PRODUIT ===== */
.prod-card{
  background:var(--glass);
  border:1px solid var(--bord);
  border-radius:14px;overflow:hidden;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:transform .28s,box-shadow .28s;
  animation:cardPop .4s ease-out both;
}
body.light .prod-card{
  background:rgba(255,255,255,.65);
  border-color:rgba(139,105,20,.3);
  box-shadow:0 2px 10px rgba(0,0,0,.07);
}
@keyframes cardPop{from{opacity:0;transform:scale(.93) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.prod-card:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(201,168,76,.16);}
.prod-card:active{transform:scale(.97);}

.prod-img{width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--bg3);display:block;}
.prod-body{padding:.7rem .7rem .85rem;}

.prod-badge{
  font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--or);border:1px solid rgba(201,168,76,.35);
  border-radius:50px;padding:.17rem .52rem;display:inline-block;margin-bottom:.38rem;
}
body.light .prod-badge{color:var(--or-d);border-color:rgba(139,105,20,.4);}

.prod-name{
  font-family:'Cormorant Garamond',serif;
  font-size:.97rem;font-weight:700;line-height:1.25;
  color:var(--txt);margin-bottom:.18rem;
}
.prod-genre{font-size:.54rem;letter-spacing:.14em;color:var(--gris);text-transform:uppercase;margin-bottom:.48rem;}

.prod-price{
  font-family:'Cormorant Garamond',serif;font-size:1.08rem;font-weight:700;
  background:linear-gradient(90deg,var(--or-d),var(--or-l));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.prod-price small{font-family:'Montserrat',sans-serif;font-size:.58rem;}

.btn-wa{
  display:flex;align-items:center;justify-content:center;gap:.35rem;
  margin-top:.62rem;width:100%;
  background:linear-gradient(135deg,#0f7a5e,#25D366);
  border:none;border-radius:8px;
  color:#fff;font-size:.62rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  font-family:'Montserrat',sans-serif;padding:.55rem .4rem;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:opacity .22s,transform .15s;
}
.btn-wa:active{opacity:.8;transform:scale(.97);}

/* ===== ÉTAT VIDE ===== */
.empty-cat{
  grid-column:1/-1;text-align:center;padding:3.5rem 1.5rem;
}
.empty-cat h3{
  font-family:'Cormorant Garamond',serif;font-size:1.45rem;
  color:var(--or);margin-bottom:.4rem;
}
.empty-cat p{font-size:.75rem;color:var(--gris);line-height:1.7;}
body.light .empty-cat h3{color:var(--or-d);}

/* ===== BOTTOM NAV (sans Admin) ===== */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:rgba(6,6,6,.92);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-top:1px solid var(--bord);
  display:flex;
  padding-bottom:var(--safe-bottom);
}
body.light .bottom-nav{
  background:rgba(242,237,224,.95);
  border-top-color:rgba(139,105,20,.3);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:.18rem;
  padding:.6rem .2rem .5rem;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  color:var(--gris);font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;
  border:none;background:none;font-family:'Montserrat',sans-serif;
  transition:color .2s;
}
.nav-item.active{color:var(--or);}
body.light .nav-item.active{color:var(--or-d);}
body.light .nav-item{color:var(--gris);}
.nav-icon{font-size:1.2rem;line-height:1;}

/* ===== WHATSAPP FLOTTANT ===== */
.wa-float{
  position:fixed;bottom:calc(var(--safe-bottom) + 68px);right:1rem;z-index:400;
  width:52px;height:52px;border-radius:50%;
  background:var(--wa);
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;
  animation:waPulse 2s ease-in-out infinite;
}
@keyframes waPulse{
  0%{box-shadow:0 0 0 0 rgba(37,211,102,.6);}
  70%{box-shadow:0 0 0 16px rgba(37,211,102,0);}
  100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}
}
.wa-float:active{transform:scale(.92);}
.wa-float svg{width:28px;height:28px;}

/* Loader */
.loader-wrap{grid-column:1/-1;display:flex;justify-content:center;padding:3rem;}
.loader{width:30px;height:30px;border-radius:50%;border:2px solid rgba(201,168,76,.2);border-top-color:var(--or);animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-txt">Bienvenue sur ma page Khaled Watch 😉</div>
  <div class="splash-bar"></div>
  <div class="splash-sub">Collection Prestige · Montres &amp; Bijoux</div>
</div>

<div class="bg-fixed"></div>

<!-- HEADER -->
<header class="app-header">
  <div class="logo-txt">KHALED WATCH</div>
  <button class="btn-theme" id="btnTheme" onclick="toggleTheme()">☀ Clair</button>
</header>

<!-- ======== PAGE ACCUEIL ======== -->
<div id="page-home">
  <div class="home-hero">
    <div class="home-subtitle">Collection Prestige 2025</div>
    <div class="home-title">Khaled Watch</div>
    <div class="home-desc">Explorez notre sélection exclusive de montres &amp; bijoux de prestige.</div>
  </div>

  <div class="cat-grid">
    <div class="cat-card" onclick="openCat('Montres')">
      <div class="cat-icon">⌚</div>
      <div class="cat-label">Montres</div>
      <div class="cat-count" id="cnt-Montres">—</div>
    </div>
    <div class="cat-card" onclick="openCat('Montres Luxueuses')">
      <div class="cat-icon">💎</div>
      <div class="cat-label">Montres Luxe</div>
      <div class="cat-count" id="cnt-Montres Luxueuses">—</div>
    </div>
    <div class="cat-card" onclick="openCat('Chaînes')">
      <div class="cat-icon">⛓</div>
      <div class="cat-label">Chaînes</div>
      <div class="cat-count" id="cnt-Chaînes">—</div>
    </div>
    <div class="cat-card" onclick="openCat('Bracelets')">
      <div class="cat-icon">💫</div>
      <div class="cat-label">Bracelets</div>
      <div class="cat-count" id="cnt-Bracelets">—</div>
    </div>
    <div class="cat-card" onclick="openCat('Colliers')">
      <div class="cat-icon">📿</div>
      <div class="cat-label">Colliers</div>
      <div class="cat-count" id="cnt-Colliers">—</div>
    </div>
    <div class="cat-card" onclick="openCat('Bagues')">
      <div class="cat-icon">💍</div>
      <div class="cat-label">Bagues</div>
      <div class="cat-count" id="cnt-Bagues">—</div>
    </div>
    <div class="cat-card" onclick="openCat('Autres')">
      <div class="cat-icon">✨</div>
      <div class="cat-label">Autres</div>
      <div class="cat-count" id="cnt-Autres">—</div>
    </div>
  </div>
</div>

<!-- ======== PAGE CATÉGORIE ======== -->
<div id="page-cat">
  <div class="page-cat-header">
    <div class="btn-back" onclick="goHome()">←</div>
    <span class="cat-page-icon" id="catPageIcon"></span>
    <div class="cat-page-title" id="catPageTitle"></div>
  </div>
  <div class="gender-tabs">
    <button class="g-tab active" data-g="tous" onclick="setGender(this)">Tous</button>
    <button class="g-tab" data-g="Homme" onclick="setGender(this)">Homme</button>
    <button class="g-tab" data-g="Femme" onclick="setGender(this)">Femme</button>
  </div>
  <div class="prod-grid" id="prodGrid">
    <div class="loader-wrap"><div class="loader"></div></div>
  </div>
</div>

<!-- BOTTOM NAV — sans lien Admin -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-home" onclick="goHome()">
    <span class="nav-icon">🏠</span>Accueil
  </button>
  <button class="nav-item" onclick="openCat('Montres')">
    <span class="nav-icon">⌚</span>Montres
  </button>
  <button class="nav-item" onclick="openCat('Chaînes')">
    <span class="nav-icon">⛓</span>Chaînes
  </button>
  <button class="nav-item" onclick="openCat('Bracelets')">
    <span class="nav-icon">💫</span>Bracelets
  </button>
  <button class="nav-item" onclick="openCat('Colliers')">
    <span class="nav-icon">📿</span>Colliers
  </button>
</nav>

<!-- WHATSAPP -->
<a class="wa-float" href="https://wa.me/2290169515730" target="_blank" rel="noopener">
  <svg viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<script>
const WA = '2290169515730';
const CAT_ICONS = {
  'Montres':'⌚','Montres Luxueuses':'💎','Chaînes':'⛓',
  'Bracelets':'💫','Colliers':'📿','Bagues':'💍','Autres':'✨'
};

let allProducts = [];
let currentCat  = '';
let currentGender = 'tous';

/* ---- CHARGEMENT ---- */
async function loadProducts(){
  try{
    const r = await fetch('produits.json?t='+Date.now());
    if(!r.ok) throw 0;
    allProducts = await r.json();
  }catch{ allProducts = []; }
  updateCounts();
}

function updateCounts(){
  Object.keys(CAT_ICONS).forEach(c => {
    const el = document.getElementById('cnt-'+c);
    if(!el) return;
    const n = allProducts.filter(p => p.categorie === c).length;
    el.textContent = n + (n <= 1 ? ' article' : ' articles');
  });
}

/* ---- NAVIGATION — UNE SEULE définition de openCat ---- */
function goHome(){
  document.getElementById('page-home').style.display = 'block';
  document.getElementById('page-cat').style.display  = 'none';
  document.getElementById('nav-home').classList.add('active');
  window.scrollTo(0,0);
}

function openCat(cat){
  currentCat    = cat;
  currentGender = 'tous';

  /* reset filtre genre */
  document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.g-tab[data-g="tous"]').classList.add('active');

  /* mise à jour titre */
  document.getElementById('catPageTitle').textContent = cat;
  document.getElementById('catPageIcon').textContent  = CAT_ICONS[cat] || '✦';

  /* affichage */
  document.getElementById('page-home').style.display = 'none';
  document.getElementById('page-cat').style.display  = 'block';
  document.getElementById('nav-home').classList.remove('active');

  window.scrollTo(0,0);
  renderProducts();
}

function setGender(btn){
  document.querySelectorAll('.g-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentGender = btn.dataset.g;
  renderProducts();
}

/* ---- RENDU PRODUITS ---- */
const WA_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;

function renderProducts(){
  const grid = document.getElementById('prodGrid');
  let list = allProducts.filter(p => p.categorie === currentCat);
  if(currentGender !== 'tous') list = list.filter(p => p.genre === currentGender);

  if(!list.length){
    grid.innerHTML = `<div class="empty-cat">
      <h3>Collection à venir</h3>
      <p>Aucun produit dans cette catégorie pour le moment.<br>Revenez bientôt !</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map((p,i) => `
    <div class="prod-card" style="animation-delay:${i*.06}s">
      <img class="prod-img" src="${h(p.image)}" alt="${h(p.nom)}" loading="lazy"
        onerror="this.src='https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&q=70'">
      <div class="prod-body">
        <div class="prod-badge">${h(p.categorie)}</div>
        <div class="prod-name">${h(p.nom)}</div>
        <div class="prod-genre">${h(p.genre||'')}</div>
        <div class="prod-price">${fmt(p.prix)} <small>FCFA</small></div>
        <button class="btn-wa" onclick="commander('${js(p.nom)}','${js(p.prix)}')">
          ${WA_SVG} Commander
        </button>
      </div>
    </div>
  `).join('');
}

function commander(nom, prix){
  const msg = `Bonjour Khaled Watch 👋\n\nJe suis intéressé(e) par :\n✦ *${nom}*\n💰 Prix : ${fmt(prix)} FCFA\n\nPouvez-vous me donner plus d'informations ? Merci !`;
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`, '_blank');
}

/* ---- THÈME ---- */
function toggleTheme(){
  const isLight = document.body.classList.toggle('light');
  document.getElementById('btnTheme').textContent = isLight ? '🌙 Sombre' : '☀ Clair';
  localStorage.setItem('kw-theme', isLight ? 'light' : 'dark');
}
if(localStorage.getItem('kw-theme') === 'light'){
  document.body.classList.add('light');
  document.getElementById('btnTheme').textContent = '🌙 Sombre';
}

/* ---- UTILS ---- */
function h(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function js(s){ return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function fmt(n){ return Number(n||0).toLocaleString('fr-FR'); }

/* ---- INIT ---- */
loadProducts();
</script>
